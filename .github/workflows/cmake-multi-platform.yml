# This starter workflow is for a CMake project running on multiple platforms. There is a different starter workflow if you just want a single platform.
# See: https://github.com/actions/starter-workflows/blob/main/ci/cmake-single-platform.yml
name: CMake on multiple platforms

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ${{ matrix.os }}

    strategy:
      # Set fail-fast to false to ensure that feedback is delivered for all matrix combinations. Consider changing this to true when your workflow is stable.
      fail-fast: false

      # Set up a matrix to run the following 3 configurations:
      # 1. <Windows, Release, latest MSVC compiler toolchain on the default runner image, default generator>
      # 2. <Linux, Release, latest GCC compiler toolchain on the default runner image, default generator>
      # 3. <Linux, Release, latest Clang compiler toolchain on the default runner image, default generator>
      #
      # To add more build types (Release, Debug, RelWithDebInfo, etc.) customize the build_type list.
      # matrix:
      #   os: [ubuntu-latest, windows-latest]
      #   build_type: [Release]
      #   c_compiler: [gcc, clang, cl]
      #   include:
      #     - os: windows-latest
      #       c_compiler: cl
      #       cpp_compiler: cl
      #     - os: ubuntu-latest
      #       c_compiler: gcc
      #       cpp_compiler: g++
      #     - os: ubuntu-latest
      #       c_compiler: clang
      #       cpp_compiler: clang++
      #   exclude:
      #     - os: windows-latest
      #       c_compiler: gcc
      #     - os: windows-latest
      #       c_compiler: clang
      #     - os: ubuntu-latest
      #       c_compiler: cl

      matrix:
        # 1. Added both macos versions to the operating system array
        os: [ubuntu-latest, windows-latest, macos-latest, macos-15-intel]
        build_type: [Release]
        c_compiler: [gcc, clang, cl]
        include:
          - os: windows-latest
            c_compiler: cl
            cpp_compiler: cl
          # 2. MinGW/GCC on Windows — Ninja generator required (VS generator is incompatible with GCC)
          #    MinGW-w64 (gcc/g++) is pre-installed at C:\msys64\mingw64\bin on windows-latest.
          #    cmake_generator is empty for all other entries; the Configure step appends it safely.
          - os: windows-latest
            c_compiler: gcc
            cpp_compiler: g++
            cmake_generator: -G Ninja
          - os: ubuntu-latest
            c_compiler: gcc
            cpp_compiler: g++
          - os: ubuntu-latest
            c_compiler: clang
            cpp_compiler: clang++
          # 3. Explicitly map macos-latest (ARM64) to use Clang
          - os: macos-latest
            c_compiler: clang
            cpp_compiler: clang++
          # 4. Explicitly map macos-15 (Intel x86_64) to use Clang
          - os: macos-15-intel
            c_compiler: clang
            cpp_compiler: clang++
        exclude:
          - os: windows-latest
            c_compiler: clang
          - os: ubuntu-latest
            c_compiler: cl
          # 5. Prevent both macOS runners from testing invalid GCC/MSVC combinations
          - os: macos-latest
            c_compiler: gcc
          - os: macos-latest
            c_compiler: cl
          - os: macos-15-intel
            c_compiler: gcc
          - os: macos-15-intel
            c_compiler: cl

    steps:
    - uses: actions/checkout@v5

    - name: Set reusable strings
      # Turn repeated input strings (such as the build output directory) into step outputs. These step outputs can be used throughout the workflow file.
      id: strings
      shell: bash
      run: |
        echo "build-output-dir=${{ github.workspace }}/build" >> "$GITHUB_OUTPUT"

    - name: Add MinGW to PATH (Windows GCC)
      if: runner.os == 'Windows' && matrix.c_compiler == 'gcc'
      shell: pwsh
      run: |
        "C:\msys64\mingw64\bin" | Out-File -Append -FilePath $env:GITHUB_PATH -Encoding utf8

    - name: Install SDL3 Linux Dependencies
      if: runner.os == 'Linux'
      run: |
        sudo apt-get update
        sudo apt-get install -y \
          build-essential \
          libx11-dev \
          libxcursor-dev \
          libxext-dev \
          libxi-dev \
          libxkbcommon-dev \
          libxrandr-dev \
          libxss-dev \
          libxtst-dev \
          libwayland-dev \
          wayland-protocols \
          libdecor-0-dev \
          libgl1-mesa-dev \
          libvulkan-dev

    - name: Install Vulkan SDK (macOS)
      if: runner.os == 'macOS'
      env:
        # aws/tap is pre-installed on GitHub runners but not trusted under Homebrew 5.x
        # tap-trust rules; suppress the warning since we don't use that tap directly.
        HOMEBREW_NO_REQUIRE_TAP_TRUST: 1
      run: brew install vulkan-headers vulkan-loader

    - name: Get Vulkan SDK version (Windows)
      if: runner.os == 'Windows'
      id: vulkan-ver
      shell: pwsh
      run: |
        $resp = Invoke-RestMethod "https://vulkan.lunarg.com/sdk/latest/windows.json"
        Write-Host "LunarG API response: $($resp | ConvertTo-Json -Compress)"
        # Key was "64" historically; probe common alternatives in case the schema changed
        $ver = @($resp."64", $resp.windows, $resp.version) | Where-Object { $_ } | Select-Object -First 1
        if (-not $ver) { throw "Cannot determine Vulkan SDK version from LunarG response: $($resp | ConvertTo-Json -Compress)" }
        Write-Host "Vulkan SDK version: $ver"
        "ver=$ver" | Out-File -Append -FilePath $env:GITHUB_OUTPUT -Encoding utf8

    - name: Cache Vulkan SDK (Windows)
      if: runner.os == 'Windows'
      id: vulkan-cache
      uses: actions/cache@v5
      with:
        path: C:\VulkanSDK\${{ steps.vulkan-ver.outputs.ver }}
        key: vulkan-sdk-windows-${{ steps.vulkan-ver.outputs.ver }}

    - name: Download and install Vulkan SDK (Windows, cache miss)
      if: runner.os == 'Windows' && steps.vulkan-cache.outputs.cache-hit != 'true'
      shell: pwsh
      run: |
        $ver = "${{ steps.vulkan-ver.outputs.ver }}"
        $url = "https://sdk.lunarg.com/sdk/download/$ver/windows/vulkan_sdk.exe"
        Invoke-WebRequest $url -OutFile VulkanSDK.exe
        Start-Process -FilePath ".\VulkanSDK.exe" `
            -ArgumentList "--accept-licenses --default-answer --confirm-command install" `
            -NoNewWindow -Wait

    - name: Set Vulkan SDK environment (Windows)
      if: runner.os == 'Windows'
      shell: pwsh
      run: |
        $sdkPath = "C:\VulkanSDK\${{ steps.vulkan-ver.outputs.ver }}"
        "VULKAN_SDK=$sdkPath" | Out-File -Append $env:GITHUB_ENV -Encoding utf8
        "$sdkPath\Bin"        | Out-File -Append $env:GITHUB_PATH -Encoding utf8

    - name: Configure CMake
      # Configure CMake in a 'build' subdirectory. `CMAKE_BUILD_TYPE` is only required if you are using a single-configuration generator such as make.
      # See https://cmake.org/cmake/help/latest/variable/CMAKE_BUILD_TYPE.html?highlight=cmake_build_type
      # shell: bash ensures consistent quoting on all platforms; cmake_generator is empty for
      # non-MinGW entries and expands to "-G Ninja" for the Windows/GCC (MinGW) entry.
      shell: bash
      run: >
        cmake -B "${{ steps.strings.outputs.build-output-dir }}"
        -DCMAKE_CXX_COMPILER=${{ matrix.cpp_compiler }}
        -DCMAKE_C_COMPILER=${{ matrix.c_compiler }}
        -DCMAKE_BUILD_TYPE=${{ matrix.build_type }}
        -DIMGUI_GFX_BACKEND=SDL_VULKAN
        ${{ matrix.cmake_generator }}
        -S "${{ github.workspace }}"

    - name: Build
      # Build your program with the given configuration. Note that --config is needed because the default Windows generator is a multi-config generator (Visual Studio generator).
      run: cmake --build ${{ steps.strings.outputs.build-output-dir }} --config ${{ matrix.build_type }}

    - name: Test
      working-directory: ${{ steps.strings.outputs.build-output-dir }}
      # Execute tests defined by the CMake configuration. Note that --build-config is needed because the default Windows generator is a multi-config generator (Visual Studio generator).
      # See https://cmake.org/cmake/help/latest/manual/ctest.1.html for more detail
      run: ctest --build-config ${{ matrix.build_type }}
